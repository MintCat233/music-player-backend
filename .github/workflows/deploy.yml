name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mintcat233/api-enhanced

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.2
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          APP_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          API_AUTH_JWT_SECRET: ${{ secrets.API_AUTH_JWT_SECRET }}
          API_AUTH_JWT_ISSUER: ${{ vars.API_AUTH_JWT_ISSUER }}
          API_AUTH_JWT_AUDIENCE: ${{ vars.API_AUTH_JWT_AUDIENCE }}
          APP_JWT_EXPIRES_IN_SECONDS: ${{ vars.APP_JWT_EXPIRES_IN_SECONDS }}
          APP_ENABLE_DEMO_LOGIN: ${{ vars.APP_ENABLE_DEMO_LOGIN }}
          APP_DEMO_USER_EMAIL: ${{ secrets.APP_DEMO_USER_EMAIL }}
          APP_DEMO_USER_PASSWORD: ${{ secrets.APP_DEMO_USER_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CORS_ALLOW_ORIGIN: ${{ vars.CORS_ALLOW_ORIGIN }}
          ENABLE_PROXY: ${{ vars.ENABLE_PROXY }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          ENABLE_GENERAL_UNBLOCK: ${{ vars.ENABLE_GENERAL_UNBLOCK }}
          ENABLE_FLAC: ${{ vars.ENABLE_FLAC }}
          SELECT_MAX_BR: ${{ vars.SELECT_MAX_BR }}
          FOLLOW_SOURCE_ORDER: ${{ vars.FOLLOW_SOURCE_ORDER }}
          NETEASE_COOKIE: ${{ secrets.NETEASE_COOKIE }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: DEPLOY_PATH,APP_IMAGE,GHCR_USERNAME,GHCR_TOKEN,API_AUTH_JWT_SECRET,API_AUTH_JWT_ISSUER,API_AUTH_JWT_AUDIENCE,APP_JWT_EXPIRES_IN_SECONDS,APP_ENABLE_DEMO_LOGIN,APP_DEMO_USER_EMAIL,APP_DEMO_USER_PASSWORD,SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY,SUPABASE_SERVICE_ROLE_KEY,CORS_ALLOW_ORIGIN,ENABLE_PROXY,PROXY_URL,ENABLE_GENERAL_UNBLOCK,ENABLE_FLAC,SELECT_MAX_BR,FOLLOW_SOURCE_ORDER,NETEASE_COOKIE
          script_stop: true
          script: |
            set -eu

            if [ -z "${DEPLOY_PATH:-}" ]; then
              DEPLOY_PATH="$HOME/api-enhanced"
            fi

            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            cat > docker-compose.yml <<'EOF'
            services:
              ncm-api:
                image: ${APP_IMAGE}
                container_name: api-enhanced-ncm-api
                restart: unless-stopped
                env_file:
                  - .env
                environment:
                  PORT: 3000
                  HOST: 0.0.0.0
                  API_AUTH_ENABLED: ${API_AUTH_ENABLED:-true}
                ports:
                  - '3500:3000'

              custom-backend:
                image: ${APP_IMAGE}
                container_name: api-enhanced-custom-backend
                restart: unless-stopped
                depends_on:
                  - ncm-api
                env_file:
                  - .env
                environment:
                  APP_BACKEND_HOST: 0.0.0.0
                  APP_BACKEND_PORT: 4000
                  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
                command: ['/sbin/tini', '--', 'node', 'custom-backend/index.js']
                ports:
                  - '3510:4000'
            EOF

            cat > .env <<EOF
            APP_IMAGE=${APP_IMAGE}
            API_AUTH_ENABLED=true
            API_AUTH_JWT_SECRET=${API_AUTH_JWT_SECRET}
            API_AUTH_JWT_ISSUER=${API_AUTH_JWT_ISSUER:-app-backend}
            API_AUTH_JWT_AUDIENCE=${API_AUTH_JWT_AUDIENCE:-ncm-api}
            APP_JWT_EXPIRES_IN_SECONDS=${APP_JWT_EXPIRES_IN_SECONDS:-3600}
            APP_ENABLE_DEMO_LOGIN=${APP_ENABLE_DEMO_LOGIN:-false}
            APP_DEMO_USER_EMAIL=${APP_DEMO_USER_EMAIL:-}
            APP_DEMO_USER_PASSWORD=${APP_DEMO_USER_PASSWORD:-}
            SUPABASE_URL=${SUPABASE_URL:-}
            SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY:-}
            SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
            CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN:-*}
            ENABLE_PROXY=${ENABLE_PROXY:-false}
            PROXY_URL=${PROXY_URL:-}
            ENABLE_GENERAL_UNBLOCK=${ENABLE_GENERAL_UNBLOCK:-false}
            ENABLE_FLAC=${ENABLE_FLAC:-true}
            SELECT_MAX_BR=${SELECT_MAX_BR:-false}
            FOLLOW_SOURCE_ORDER=${FOLLOW_SOURCE_ORDER:-true}
            NETEASE_COOKIE=${NETEASE_COOKIE:-}
            EOF

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
